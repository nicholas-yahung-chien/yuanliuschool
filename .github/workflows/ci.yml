name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-links-and-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Broken link check (internal routes)
        run: python tools/check_broken_links.py --site-dir site --pages-csv site/_meta/pages.csv --output site/_meta/broken_links.csv
      - name: Validate static references
        run: python tools/validate_site.py --site-dir site
      - name: Upload link and reference reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-and-reference-reports
          path: |
            site/_meta/broken_links.csv
            site/_meta/assets_failed.csv

  visual-compare-sample:
    runs-on: ubuntu-latest
    needs: validate-links-and-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install node dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start local static server
        run: |
          python -m http.server 4173 --directory site >/tmp/static.log 2>&1 &
          sleep 2
      - name: Visual compare sample (desktop + mobile)
        run: node tools/visual_compare.mjs --source-base https://yuanliuschool.com --target-base http://127.0.0.1:4173 --pages-csv site/_meta/pages.csv --sample 10 --output-dir reports/visual-ci --max-diff-ratio 0.6 --max-size-delta-ratio 0.2
      - name: Upload visual compare artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-compare-report
          path: reports/visual-ci
